<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Moderno - ITAP</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/variablesglobales.css">
</head>

<body>

  <!-- Header -->
  <header class="header-container">
    <div class="text-center">
      <h1 class="header-title">Instituto Tecnológico de Agua Prieta</h1>
      <p class="header-description">Accede al Laboratorio de Cómputo</p>
    </div>
  </header>

  <!-- Card Login -->
  <div class="login-wrapper">
    <div class="card login-card p-4">

      <div class="text-center mb-3">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo mb-2">
        <h4 class="fw-bold">Iniciar Sesión</h4>
        <small class="text-muted">Laboratorio de Cómputo</small>
      </div>

      <form id="loginForm" method="POST" action="validar_login.php">

        <!-- Número de Control -->
        <div class="form-floating mb-3">
          <input type="text" class="form-control" name="num_control" placeholder="Número de Control" required>
          <label for="tarjeta"><i class="bi bi-person-badge"></i> Número de Control</label>
        </div>

        <!-- Contraseña -->
        <div class="form-floating mb-3 position-relative">
          <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
          <label for="password"><i class="bi bi-lock"></i> Contraseña</label>

          <!-- Botón mostrar contraseña -->
          <i class="bi bi-eye toggle-password" id="togglePassword"></i>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn btn-primary w-100">
          Ingresar
        </button>

        <!-- Olvidé contraseña -->
        <p class="text-center mt-3">
          <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
        </p>

        <!-- Mensaje -->
        <div id="mensaje" class="mt-3 text-center"></div>

      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Derechos Reservados Centro de Computo - ITAP
  </footer>

</body>
</html>
